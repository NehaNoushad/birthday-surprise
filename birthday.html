<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A surprise for you 🎂</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --text: #fff7fb;
    --glow: #ffd166;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    background: linear-gradient(160deg, var(--bg1, #1a1440), var(--bg2, #4b2c73));
    background-attachment: fixed;
  }
  body[data-theme="night"]  { --bg1: #120e33; --bg2: #4b2c73; }
  body[data-theme="sunset"] { --bg1: #7a1f3d; --bg2: #ff8c42; }
  body[data-theme="candy"]  { --bg1: #83245e; --bg2: #7c4dff; }
  body[data-theme="ocean"]  { --bg1: #062c4d; --bg2: #12a3c9; }

  #stars, #confetti {
    position: fixed; inset: 0; width: 100%; height: 100%;
    pointer-events: none;
  }
  #confetti { z-index: 50; }

  .scene {
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center;
    padding: 24px;
    position: relative;
    z-index: 2;
  }

  /* ---------- Scene 1: intro + cake ---------- */
  #intro-line {
    font-size: clamp(20px, 4.5vw, 30px);
    min-height: 1.5em;
    color: #ffffffd9;
    letter-spacing: .5px;
  }
  #intro-line .cursor {
    display: inline-block; width: 2px; height: 1.1em;
    background: var(--glow); margin-left: 2px;
    vertical-align: text-bottom;
    animation: blink .8s infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  #cake-area { opacity: 0; transition: opacity 1.2s ease; margin-top: 40px; }
  #cake-area.show { opacity: 1; }

  .cake { position: relative; width: 240px; margin: 0 auto; cursor: pointer; transition: transform .2s; }
  .cake:hover { transform: scale(1.03); }
  .layer { border-radius: 14px; margin: 0 auto; position: relative; }
  .layer-1 { width: 220px; height: 62px; background: linear-gradient(#a2547a, #8a3f65); }
  .layer-2 { width: 180px; height: 56px; background: linear-gradient(#c96f9b, #a2547a); margin-top: -8px; }
  .layer-3 { width: 140px; height: 50px; background: linear-gradient(#eb92bb, #c96f9b); margin-top: -8px; }
  .icing {
    position: absolute; top: -10px; left: 0; right: 0; height: 24px;
    background: #fff0f6; border-radius: 14px 14px 0 0;
  }
  .icing::after {
    content: ""; position: absolute; left: 8%; right: 8%; top: 16px; height: 16px;
    background:
      radial-gradient(circle at 10% 0, #fff0f6 12px, transparent 13px),
      radial-gradient(circle at 30% 0, #fff0f6 10px, transparent 11px),
      radial-gradient(circle at 50% 0, #fff0f6 13px, transparent 14px),
      radial-gradient(circle at 70% 0, #fff0f6 10px, transparent 11px),
      radial-gradient(circle at 90% 0, #fff0f6 12px, transparent 13px);
  }
  .plate {
    width: 260px; height: 16px; background: #ffffff2e;
    border-radius: 50%; margin: 6px auto 0;
  }
  .candles {
    position: absolute; top: -46px; left: 0; right: 0;
    display: flex; justify-content: center; gap: 26px;
  }
  .candle { width: 10px; height: 38px; border-radius: 4px; position: relative; }
  .candle:nth-child(1) { background: repeating-linear-gradient(45deg, #ffd166, #ffd166 5px, #fff 5px, #fff 10px); }
  .candle:nth-child(2) { background: repeating-linear-gradient(45deg, #7ce0ff, #7ce0ff 5px, #fff 5px, #fff 10px); }
  .candle:nth-child(3) { background: repeating-linear-gradient(45deg, #ff9ecb, #ff9ecb 5px, #fff 5px, #fff 10px); }
  .flame {
    position: absolute; top: -20px; left: 50%; transform: translateX(-50%);
    width: 14px; height: 20px;
    background: radial-gradient(circle at 50% 75%, #fff6c9, #ffd166 45%, #ff8c42 80%);
    border-radius: 50% 50% 50% 50% / 62% 62% 38% 38%;
    animation: flicker .28s infinite alternate;
    box-shadow: 0 0 18px 6px #ffd16688;
    transition: opacity .3s, transform .3s;
  }
  @keyframes flicker {
    from { transform: translateX(-50%) scale(1) rotate(-3deg); }
    to   { transform: translateX(-50%) scale(1.12) rotate(3deg); }
  }
  .blown .flame { opacity: 0; transform: translateX(-50%) scale(.2); }
  .smoke {
    position: absolute; top: -26px; left: 50%;
    width: 6px; height: 6px; border-radius: 50%;
    background: #ffffff88; opacity: 0;
  }
  .blown .smoke { animation: rise 1.4s ease-out forwards; }
  @keyframes rise {
    0% { opacity: .9; transform: translate(-50%, 0) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -46px) scale(2.6); }
  }
  #blow-hint {
    margin-top: 26px; color: #ffffffb0; font-size: 15px;
    animation: bob 1.6s ease-in-out infinite;
  }
  @keyframes bob { 50% { transform: translateY(-5px); } }

  /* ---------- Scene 2: celebration ---------- */
  #celebrate { display: none; }
  #celebrate.show { display: flex; }
  .big-title {
    font-size: clamp(40px, 9vw, 84px);
    font-weight: 800;
    line-height: 1.1;
    background: linear-gradient(90deg, #ffd166, #ff7eb6, #b388ff);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: pop-in .7s cubic-bezier(.2, 1.4, .4, 1) both;
  }
  .sub-title {
    font-size: clamp(18px, 3.5vw, 26px);
    color: #ffffffcc;
    margin-top: 14px;
    animation: pop-in .7s .18s cubic-bezier(.2, 1.4, .4, 1) both;
  }
  @keyframes pop-in {
    from { opacity: 0; transform: scale(.6) translateY(24px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  .message-card {
    max-width: 560px;
    background: #ffffff14;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid #ffffff26;
    border-radius: 20px;
    padding: 30px 34px;
    margin-top: 38px;
    font-size: clamp(16px, 2.6vw, 19px);
    line-height: 1.75;
    white-space: pre-wrap;
    animation: pop-in .7s .4s cubic-bezier(.2, 1.4, .4, 1) both;
  }
  .message-card .from {
    display: block; margin-top: 18px;
    color: var(--glow); font-style: italic; font-size: 16px;
  }

  .wishes-title {
    margin-top: 56px; font-size: 14px; letter-spacing: 2.5px;
    text-transform: uppercase; color: #ffffff99;
    animation: pop-in .7s .55s both;
  }
  .wishes {
    display: flex; flex-wrap: wrap; gap: 14px;
    justify-content: center; max-width: 720px; margin-top: 20px;
    padding-bottom: 30px;
  }
  .wish {
    background: #ffffff14;
    border: 1px solid #ffffff26;
    border-radius: 14px;
    padding: 14px 20px;
    font-size: 15.5px;
    cursor: pointer;
    min-width: 130px;
    transition: transform .2s, background .2s;
    animation: pop-in .6s both;
  }
  .wish:hover { transform: translateY(-3px) rotate(-1deg); background: #ffffff22; }
  .wish.closed { color: var(--glow); font-weight: 600; }
  .wish .body { display: none; }
  .wish.open .label { display: none; }
  .wish.open .body { display: block; }
  .wish.open { cursor: default; background: #ffffff1f; }

  .balloon {
    position: fixed; bottom: -140px; z-index: 1;
    width: 54px; height: 66px; border-radius: 50% 50% 48% 48%;
    opacity: .85;
    animation: float linear forwards;
  }
  .balloon::after {
    content: ""; position: absolute; left: 50%; top: 100%;
    width: 2px; height: 60px; background: #ffffff59;
  }
  @keyframes float {
    to { transform: translateY(-120vh) rotate(8deg); }
  }

  footer {
    position: relative; z-index: 2;
    text-align: center; padding: 30px 20px 44px;
    color: #ffffff80; font-size: 14px;
    display: none;
  }
  footer.show { display: block; }

  #make-yours {
    position: fixed; right: 18px; bottom: 18px; z-index: 60;
    background: #ffffff1a;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid #ffffff2e;
    border-radius: 999px;
    padding: 10px 18px;
    color: var(--text);
    text-decoration: none;
    font-size: 14px; font-weight: 600;
    opacity: 0;
    transform: translateY(14px);
    pointer-events: none;
    transition: opacity .6s ease, transform .6s ease, background .2s;
  }
  #make-yours.show { opacity: 1; transform: translateY(0); pointer-events: auto; }
  #make-yours:hover { background: #ffffff2e; }
</style>
</head>
<body data-theme="night">
<canvas id="stars"></canvas>
<canvas id="confetti"></canvas>

<section class="scene" id="scene-intro">
  <div id="intro-line"><span id="typed"></span><span class="cursor"></span></div>
  <div id="cake-area">
    <div class="cake" id="cake" title="Blow out the candles!">
      <div class="candles">
        <div class="candle"><div class="flame"></div><div class="smoke"></div></div>
        <div class="candle"><div class="flame"></div><div class="smoke"></div></div>
        <div class="candle"><div class="flame"></div><div class="smoke"></div></div>
      </div>
      <div class="layer layer-3"><div class="icing"></div></div>
      <div class="layer layer-2"></div>
      <div class="layer layer-1"></div>
      <div class="plate"></div>
    </div>
    <p id="blow-hint">🎂 tap the cake to blow out the candles</p>
  </div>
</section>

<section class="scene" id="celebrate">
  <h1 class="big-title" id="title"></h1>
  <p class="sub-title" id="subtitle"></p>
  <div class="message-card" id="message" hidden></div>
  <p class="wishes-title" id="wishes-title" hidden>✨ open your little gifts ✨</p>
  <div class="wishes" id="wishes"></div>
</section>

<footer id="footer"></footer>
<a id="make-yours" href="index.html" title="Create a birthday surprise for someone you love">✨ Make yours</a>

<script>
  /* ---------- data ---------- */
  function decodeData(hash) {
    try {
      let b64 = hash.replace(/-/g, '+').replace(/_/g, '/');
      while (b64.length % 4) b64 += '=';
      const bytes = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
      return JSON.parse(new TextDecoder().decode(bytes));
    } catch { return null; }
  }
  const data = decodeData(location.hash.slice(1)) || {
    to: 'Birthday Girl',
    from: '',
    age: '',
    msg: 'Someone wanted to make your day extra special. Happy birthday! 🎉',
    wishes: ['You are so loved 💛', 'This year is going to be amazing ✨'],
    theme: 'night'
  };
  document.body.dataset.theme = data.theme || 'night';
  document.title = `A surprise for ${data.to} 🎂`;

  /* ---------- starfield ---------- */
  const starsCv = document.getElementById('stars');
  const starsCtx = starsCv.getContext('2d');
  let stars = [];
  function sizeStars() {
    starsCv.width = innerWidth; starsCv.height = innerHeight;
    stars = Array.from({ length: 90 }, () => ({
      x: Math.random() * starsCv.width,
      y: Math.random() * starsCv.height,
      r: Math.random() * 1.6 + .4,
      p: Math.random() * Math.PI * 2,
      s: Math.random() * .015 + .005
    }));
  }
  sizeStars();
  addEventListener('resize', sizeStars);
  (function twinkle() {
    starsCtx.clearRect(0, 0, starsCv.width, starsCv.height);
    for (const st of stars) {
      st.p += st.s * 16;
      const a = .35 + Math.abs(Math.sin(st.p)) * .55;
      starsCtx.beginPath();
      starsCtx.arc(st.x, st.y, st.r, 0, Math.PI * 2);
      starsCtx.fillStyle = `rgba(255, 244, 214, ${a})`;
      starsCtx.fill();
    }
    requestAnimationFrame(twinkle);
  })();

  /* ---------- typewriter intro ---------- */
  const typed = document.getElementById('typed');
  const lines = [
    `Hey ${data.to}...`,
    `Someone has been planning something for you 🤫`,
    `Ready? Make a wish.`
  ];
  function typeLine(text, done) {
    let i = 0;
    typed.textContent = '';
    (function tick() {
      typed.textContent = text.slice(0, ++i);
      if (i < text.length) setTimeout(tick, 46);
      else setTimeout(done, 1300);
    })();
  }
  function playLines(idx) {
    if (idx >= lines.length) {
      document.getElementById('cake-area').classList.add('show');
      return;
    }
    typeLine(lines[idx], () => playLines(idx + 1));
  }
  playLines(0);

  /* ---------- little melody (Web Audio, no files needed) ---------- */
  function playMelody() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      // "Happy Birthday to You" — note frequencies and beats
      const N = { G4: 392, A4: 440, B4: 494, C5: 523, D5: 587, E5: 659, F5: 698, G5: 784 };
      const tune = [
        [N.G4,.4],[N.G4,.3],[N.A4,.7],[N.G4,.7],[N.C5,.7],[N.B4,1.2],
        [N.G4,.4],[N.G4,.3],[N.A4,.7],[N.G4,.7],[N.D5,.7],[N.C5,1.2],
        [N.G4,.4],[N.G4,.3],[N.G5,.7],[N.E5,.7],[N.C5,.7],[N.B4,.7],[N.A4,1.2],
        [N.F5,.4],[N.F5,.3],[N.E5,.7],[N.C5,.7],[N.D5,.7],[N.C5,1.4]
      ];
      let t = ctx.currentTime + .15;
      for (const [freq, dur] of tune) {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'triangle';
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0, t);
        gain.gain.linearRampToValueAtTime(.22, t + .03);
        gain.gain.exponentialRampToValueAtTime(.001, t + dur * .55);
        osc.connect(gain).connect(ctx.destination);
        osc.start(t); osc.stop(t + dur * .6);
        t += dur * .55;
      }
    } catch { /* no audio — the party goes on */ }
  }

  /* ---------- confetti ---------- */
  const cv = document.getElementById('confetti');
  const cx = cv.getContext('2d');
  function sizeConfetti() { cv.width = innerWidth; cv.height = innerHeight; }
  sizeConfetti();
  addEventListener('resize', sizeConfetti);
  const COLORS = ['#ffd166', '#ff7eb6', '#7ce0ff', '#b388ff', '#7bffb0', '#ff9a62'];
  let pieces = [];
  let confettiRunning = false;
  function burst(n, spread) {
    for (let i = 0; i < n; i++) {
      pieces.push({
        x: cv.width / 2 + (Math.random() - .5) * spread,
        y: cv.height * .35,
        vx: (Math.random() - .5) * 14,
        vy: -Math.random() * 13 - 4,
        w: Math.random() * 8 + 5,
        h: Math.random() * 5 + 4,
        rot: Math.random() * Math.PI * 2,
        vr: (Math.random() - .5) * .3,
        color: COLORS[Math.floor(Math.random() * COLORS.length)]
      });
    }
    if (!confettiRunning) { confettiRunning = true; tickConfetti(); }
  }
  function tickConfetti() {
    cx.clearRect(0, 0, cv.width, cv.height);
    pieces = pieces.filter(p => p.y < cv.height + 40);
    for (const p of pieces) {
      p.vy += .25; p.x += p.vx; p.y += p.vy;
      p.vx *= .99; p.rot += p.vr;
      cx.save();
      cx.translate(p.x, p.y);
      cx.rotate(p.rot);
      cx.fillStyle = p.color;
      cx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
      cx.restore();
    }
    if (pieces.length) requestAnimationFrame(tickConfetti);
    else confettiRunning = false;
  }

  /* ---------- balloons ---------- */
  function releaseBalloons() {
    for (let i = 0; i < 12; i++) {
      setTimeout(() => {
        const b = document.createElement('div');
        b.className = 'balloon';
        b.style.left = Math.random() * 92 + 2 + 'vw';
        b.style.background = `radial-gradient(circle at 35% 30%, #ffffffb3 6%, ${COLORS[i % COLORS.length]} 40%)`;
        b.style.animationDuration = 7 + Math.random() * 6 + 's';
        document.body.appendChild(b);
        setTimeout(() => b.remove(), 14000);
      }, i * 650);
    }
  }

  /* ---------- cake click → celebration ---------- */
  let blown = false;
  document.getElementById('cake').addEventListener('click', function () {
    if (blown) return;
    blown = true;
    this.classList.add('blown');
    document.getElementById('blow-hint').textContent = '✨ your wish is on its way ✨';
    playMelody();
    setTimeout(startCelebration, 1400);
  });

  function startCelebration() {
    document.getElementById('scene-intro').style.display = 'none';
    const cel = document.getElementById('celebrate');
    cel.classList.add('show');

    document.getElementById('title').textContent = `Happy Birthday, ${data.to}! 🎉`;
    const sub = document.getElementById('subtitle');
    sub.textContent = data.age
      ? `${data.age} looks absolutely amazing on you ✨`
      : `Today is all about you ✨`;

    if (data.msg) {
      const card = document.getElementById('message');
      card.hidden = false;
      card.textContent = data.msg;
      if (data.from) {
        const from = document.createElement('span');
        from.className = 'from';
        from.textContent = `— with love, ${data.from} 💛`;
        card.appendChild(from);
      }
    }

    if (data.wishes && data.wishes.length) {
      document.getElementById('wishes-title').hidden = false;
      const box = document.getElementById('wishes');
      const labels = ['🎁', '💌', '🌟', '🧁', '🎈', '💝', '🍰', '🦋', '🌈', '🎀'];
      data.wishes.forEach((w, i) => {
        const el = document.createElement('div');
        el.className = 'wish closed';
        el.style.animationDelay = (.7 + i * .12) + 's';
        el.innerHTML = `<span class="label">${labels[i % labels.length]} open me</span><span class="body"></span>`;
        el.querySelector('.body').textContent = w;
        el.onclick = () => {
          if (el.classList.contains('open')) return;
          el.classList.remove('closed');
          el.classList.add('open');
          burst(40, 200);
        };
        box.appendChild(el);
      });
    }

    if (data.from) {
      const f = document.getElementById('footer');
      f.classList.add('show');
      f.textContent = `made with ❤️ for ${data.to}, by ${data.from}`;
    }

    burst(160, cv.width * .6);
    setTimeout(() => burst(100, cv.width * .8), 900);
    setTimeout(() => burst(80, cv.width * .8), 2000);
    releaseBalloons();
    // once the celebration has fully played out, invite her to make her own
    setTimeout(() => document.getElementById('make-yours').classList.add('show'), 6500);
  }
</script>
</body>
</html>
